<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Offline — My App</title>
    <style>
      *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0f172a;
        color: #f8fafc;
        font-family: system-ui, -apple-system, sans-serif;
        padding: 2rem;
        text-align: center;
      }
      .icon { font-size: 5rem; margin-bottom: 1.5rem; }
      h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.75rem; }
      p  { color: #94a3b8; max-width: 36ch; line-height: 1.6; margin-bottom: 2rem; }
      button {
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 0.5rem;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover { background: #1d4ed8; }
    </style>
  </head>
  <body>
    <div class="icon" role="img" aria-label="No connection">📡</div>
    <h1>You're offline</h1>
    <p>
      This page isn't available without a connection.
      Check your network and try again.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </body>
</html>
