<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      meta description is intentionally generic here.
      Update it to match your project, or inject it dynamically via React Helmet / next/head.
    -->
    <meta name="description" content="A production-grade TypeScript React application" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <!--
      The <title> here is a fallback; the real title is set via
      VITE_APP_NAME at build time or document.title in main.tsx.
    -->
    <title>My App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <p style="text-align:center;padding:2rem;font-family:system-ui,sans-serif">
        This application requires JavaScript to run.
        Please enable it in your browser settings.
      </p>
    </noscript>
  </body>
</html>
