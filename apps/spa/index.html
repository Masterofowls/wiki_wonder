<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary meta ──────────────────────────────────────── -->
    <!--
      %VITE_APP_NAME% and %VITE_APP_DESCRIPTION% are replaced at build time
      by Vite from your .env.local / environment variables.
      Update VITE_APP_NAME and VITE_APP_DESCRIPTION in .env.local.
    -->
    <title>%VITE_APP_NAME%</title>
    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="author" content="%VITE_AUTHOR%" />
    <meta name="theme-color" content="#2563eb" />

    <!-- ── Open Graph ────────────────────────────────────────── -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="%VITE_APP_NAME%" />
    <meta property="og:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="og:url"         content="%VITE_APP_URL%" />
    <meta property="og:site_name"   content="%VITE_APP_NAME%" />
    <meta property="og:locale"      content="en_US" />
    <!--
      Replace with your actual OG image URL.
      Recommended size: 1200×630 px, < 8 MB, JPEG or PNG.
    -->
    <meta property="og:image"       content="%VITE_APP_URL%/og-image.png" />
    <meta property="og:image:width"  content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt"   content="%VITE_APP_NAME%" />

    <!-- ── Twitter / X Card ──────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="%VITE_APP_NAME%" />
    <meta name="twitter:description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="twitter:image"       content="%VITE_APP_URL%/og-image.png" />
    <!-- <meta name="twitter:creator" content="@your_handle" /> -->

    <!-- ── PWA ───────────────────────────────────────────────── -->
    <link rel="manifest"          href="/manifest.json" />
    <link rel="icon"              type="image/svg+xml"  href="/favicon.svg" />
    <link rel="icon"              type="image/png"      href="/icons/icon-192.png" sizes="192x192" />
    <link rel="apple-touch-icon"  href="/icons/apple-touch-icon.png" sizes="180x180" />
    <meta name="mobile-web-app-capable"       content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title"   content="%VITE_APP_NAME%" />

    <!-- ── Canonical URL ─────────────────────────────────────── -->
    <link rel="canonical" href="%VITE_APP_URL%" />

    <!-- ── Preconnect to external domains (add yours below) ─── -->
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com" /> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <noscript>
      <p style="text-align:center;padding:2rem;font-family:system-ui,sans-serif">
        This application requires JavaScript. Please enable it in your browser.
      </p>
    </noscript>
  </body>
</html>
