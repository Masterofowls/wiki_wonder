name: CI

# ── Customise triggers for your project ──────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  BUN_VERSION: "latest"

jobs:
  # ── 1. Install ────────────────────────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('**/bun.lock*') }}
          restore-keys: bun-${{ runner.os }}-

      - run: bun install --frozen-lockfile

      - name: Save deps cache
        uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('**/bun.lock*') }}

  # ── 2. Type check ────────────────────────────────────────────────
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('**/bun.lock*') }}
      - run: bun run typecheck

  # ── 3. Lint & Format ─────────────────────────────────────────────
  lint:
    name: Lint & Format (Biome)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('**/bun.lock*') }}
      - run: bun run check

  # ── 4. Unit tests ────────────────────────────────────────────────
  test-unit:
    name: Unit tests (Jest)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('**/bun.lock*') }}
      - run: bun run test:unit --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 7

  # ── 5. Build ─────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('**/bun.lock*') }}
      - name: Build Next.js app
        run: bun run build:web
        env:
          NODE_ENV: production
      - name: Build Vite SPA
        run: bun run build:spa
        env:
          NODE_ENV: production
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: apps/web/.next/
          retention-days: 3
      - uses: actions/upload-artifact@v4
        with:
          name: spa-build
          path: apps/spa/dist/
          retention-days: 3

  # ── 6. CVE scan ──────────────────────────────────────────────────
  # Remove this job if you don't use the CVE Lite tool.
  security:
    name: CVE Lite scan
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('**/bun.lock*') }}
      - name: Run CVE Lite
        run: bun run cve -- --fail-on-high --format json > cve-report.json || true
      - uses: actions/upload-artifact@v4
        with:
          name: cve-report
          path: cve-report.json
          retention-days: 14

  # ── 7. Index check ────────────────────────────────────────────────
  # Remove this job if you don't use the Index Check tool.
  index-check:
    name: Index Check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            tools/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('**/bun.lock*') }}
      - run: bun run index-check -- --path packages --format table || true
