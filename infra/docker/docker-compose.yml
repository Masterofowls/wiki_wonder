services:
  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    # Change the host port (left side) if 9000 is occupied.
    ports:
      - "9000:9000"
    environment:
      NODE_ENV: production
      # Replace these with your actual database / cache URLs.
      DATABASE_URL: postgresql://postgres:postgres@db:5432/app
      REDIS_URL: redis://redis:6379
    env_file:
      - ../../.env.local
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Strapi CMS ──────────────────────────────────────────────────
  cms:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.cms
    ports:
      - "1337:1337"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      DATABASE_CLIENT: postgres
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wikiwonder_strapi
      DATABASE_SSL: "false"
      APP_KEYS: devKey1,devKey2,devKey3,devKey4
      API_TOKEN_SALT: devsalt
      ADMIN_JWT_SECRET: devadminjwt
      TRANSFER_TOKEN_SALT: devtransfer
      JWT_SECRET: devjwt
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # ── PostgreSQL ──────────────────────────────────────────────────
  # Remove this service if you use a managed database (e.g. Neon, Supabase, RDS).
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────
  # Remove this service if you don't use caching / sessions / queues.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
